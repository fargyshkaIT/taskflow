<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель задач TaskFlow</title>
    <!-- Подключаем файл стилей через встроенную функцию url_for из папки static -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Главный блок-контейнер со стилями белой карточки по центру экрана -->
    <div class="container container-dashboard">

        <div style="margin-bottom: 30px;">
            <h2>Панель задач TaskFlow</h2>
            <p style="color: #666; font-size: 14px;">Режим демонстрации проекта</p>
        </div>

        <h3>Новая задача</h3>
        <!-- Форма отправляет данные методом POST на обработчик бэкенда /add_task -->
        <form action="/add_task" method="POST" class="task-form">
            <!-- Атрибут name="task_title" критически важен, по нему Flask найдет этот текст в Python -->
            <input type="text" name="task_title" placeholder="Что нужно сделать сегодня?" required style="flex: 1;">
            <button type="submit">Добавить</button>
        </form>

        <h3>Ваш список задач</h3>
        <div class="task-list">
            <!-- Начало цикла Jinja2. Перебираем список задач 'tasks', пришедший из Python бэкенда -->
            {% for task in tasks %}
                <div class="task-item">
                    <div>
                        <!-- task — это поле title (название задачи) из SQL-выборки -->
                        <span class="task-title">{{ task[1] }}</span>
                        <!-- task — это поле status (текущий статус задачи) -->
                        <span class="badge">{{ task[2] }}</span>
                    </div>

                    <!-- Кнопка удаления задачи. Передает в URL уникальный id задачи из базы: task -->
                    <form action="/delete_task/{{ task[0] }}" method="POST" style="margin: 0;">
                        <button type="submit" style="background-color: #e74c3c; padding: 5px 10px; font-size: 12px; border-radius: 4px;">✕</button>
                    </form>
                </div>
            {% else %}
                <!-- Этот блок сработает сам, если список задач пуст (у админа еще нет тасков) -->
                <p style="color: #888; font-style: italic;">У вас пока нет задач. Добавьте первую!</p>
            {% endfor %}
            <!-- Обязательно закрываем цикл шаблонизатора, иначе страница выдаст ошибку -->
        </div>

    </div>

</body>
</html>
