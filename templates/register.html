<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация в TaskFlow</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container">
        <h2>Регистрация аккаунта</h2>

        <!-- БЛОК ВЫВОДА ОШИБОК ВАЛИДАЦИИ ИЗ PYTHON (НАПРИМЕР, ЕСЛИ ПАРОЛЬ СЛИШКОМ ПРОСТОЙ) -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div style="background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 10px; margin-bottom: 20px; border-radius: 4px; font-size: 14px; font-weight: 500;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/register" method="POST">
            <div class="form-group">
                <label for="username">Придумайте логин:</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Придумайте пароль:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" style="width: 100%;">Зарегистрироваться</button>
        </form>

        <p style="margin-top: 15px; font-size: 14px; text-align: center;">
            Уже есть аккаунт? <a href="/login" style="color: #3498db;">Войти</a>
        </p>
    </div>

</body>
</html>
